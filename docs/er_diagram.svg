<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .table { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
      .head { fill: #2563eb; }
      .title { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .field { fill: #0f172a; font: 14px Consolas, monospace; }
      .key { fill: #1d4ed8; font: 700 14px Consolas, monospace; }
      .rel { stroke: #64748b; stroke-width: 2; fill: none; }
      .label { fill: #475569; font: 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text x="40" y="45" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">
    ER diagram: Pet najvecjih evropskih nogometnih lig
  </text>

  <g transform="translate(60 110)">
    <rect class="table" width="230" height="110"/>
    <rect class="head" width="230" height="36" rx="8"/>
    <text class="title" x="14" y="24">league</text>
    <text class="key" x="14" y="62">PK league_id</text>
    <text class="field" x="14" y="84">name</text>
    <text class="field" x="14" y="104">season</text>
  </g>

  <g transform="translate(390 90)">
    <rect class="table" width="250" height="160"/>
    <rect class="head" width="250" height="36" rx="8"/>
    <text class="title" x="14" y="24">team</text>
    <text class="key" x="14" y="62">PK team_id</text>
    <text class="key" x="14" y="84">FK league_id</text>
    <text class="field" x="14" y="106">name</text>
    <text class="field" x="14" y="128">city</text>
    <text class="field" x="14" y="150">stadium, founded_year</text>
  </g>

  <g transform="translate(780 70)">
    <rect class="table" width="250" height="145"/>
    <rect class="head" width="250" height="36" rx="8"/>
    <text class="title" x="14" y="24">player</text>
    <text class="key" x="14" y="62">PK player_id</text>
    <text class="key" x="14" y="84">FK team_id</text>
    <text class="field" x="14" y="106">name, age</text>
    <text class="field" x="14" y="128">nationality, position</text>
  </g>

  <g transform="translate(780 300)">
    <rect class="table" width="280" height="180"/>
    <rect class="head" width="280" height="36" rx="8"/>
    <text class="title" x="14" y="24">player_season_stats</text>
    <text class="key" x="14" y="62">PK/FK player_id</text>
    <text class="field" x="14" y="84">matches_played, starts</text>
    <text class="field" x="14" y="106">minutes_played</text>
    <text class="field" x="14" y="128">goals, assists</text>
    <text class="field" x="14" y="150">yellow_cards, red_cards</text>
  </g>

  <g transform="translate(390 380)">
    <rect class="table" width="270" height="175"/>
    <rect class="head" width="270" height="36" rx="8"/>
    <text class="title" x="14" y="24">match</text>
    <text class="key" x="14" y="62">PK match_id</text>
    <text class="key" x="14" y="84">FK league_id</text>
    <text class="key" x="14" y="106">FK home_team_id</text>
    <text class="key" x="14" y="128">FK away_team_id</text>
    <text class="field" x="14" y="150">match_date, round_number</text>
  </g>

  <g transform="translate(790 560)">
    <rect class="table" width="270" height="160"/>
    <rect class="head" width="270" height="36" rx="8"/>
    <text class="title" x="14" y="24">match_stats</text>
    <text class="key" x="14" y="62">PK/FK match_id</text>
    <text class="field" x="14" y="84">home_goals, away_goals</text>
    <text class="field" x="14" y="106">home_shots, away_shots</text>
    <text class="field" x="14" y="128">home_yellow, away_yellow</text>
    <text class="field" x="14" y="150">home_red, away_red</text>
  </g>

  <path class="rel" d="M290 165 L390 165"/>
  <text class="label" x="308" y="150">1 liga ima vec ekip</text>

  <path class="rel" d="M515 250 L515 380"/>
  <text class="label" x="530" y="318">ekipa nastopa na tekmah</text>

  <path class="rel" d="M640 165 L780 142"/>
  <text class="label" x="665" y="135">1 ekipa ima vec igralcev</text>

  <path class="rel" d="M905 215 L905 300"/>
  <text class="label" x="920" y="263">1 : 1</text>

  <path class="rel" d="M290 195 C330 195 330 440 390 440"/>
  <text class="label" x="110" y="365">1 liga ima vec tekem</text>

  <path class="rel" d="M660 468 C735 468 735 640 790 640"/>
  <text class="label" x="690" y="555">1 : 1 statistika tekme</text>

  <text x="40" y="720" fill="#475569" font-family="Arial, sans-serif" font-size="14">
    Opomba: match.home_team_id in match.away_team_id kazeta na team.team_id.
  </text>
</svg>
